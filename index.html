<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>귀향: 폐교의 불빛 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <div id="loading">불러오는 중...</div>

    <section id="menu" class="screen active">
      <div class="panel">
        <p class="eyebrow">Season 1 Prototype</p>
        <h1>귀향: 폐교의 불빛</h1>
        <p>3D 1인칭 폐교 공포 데모</p>
        <button id="startBtn">게임 시작</button>
        <button id="howBtn" class="subBtn">조작법</button>
      </div>
    </section>

    <section id="how" class="screen">
      <div class="panel small">
        <h2>조작법</h2>
        <p><b>패드/태블릿</b>: 왼쪽 조이스틱 이동, 오른쪽 화면 드래그로 시야 회전</p>
        <p><b>PC</b>: WASD 이동, 마우스로 시야 회전, Shift 달리기</p>
        <p><b>공통</b>: E 버튼/키로 상호작용</p>
        <button id="backBtn" class="subBtn">돌아가기</button>
      </div>
    </section>

    <section id="ending" class="screen">
      <div class="panel small">
        <h2 id="endingTitle">끝</h2>
        <p id="endingText"></p>
        <button id="restartBtn">다시 시작</button>
      </div>
    </section>

    <div id="hud" class="hidden">
      <div id="objectiveBox">
        <div class="label">현재 목표</div>
        <div id="objectiveText">□ 폐교 안으로 들어가기</div>
      </div>
      <div id="statusBox">
        <span id="fuseText">퓨즈 0/5</span>
        <span id="talismanText">부적 0/5</span>
        <span id="staminaText">체력 100%</span>
      </div>
      <div id="centerDot"></div>
      <div id="message" class="hidden"></div>
      <div id="interactHint">E: 상호작용</div>
    </div>

    <div id="mobileControls" class="hidden">
      <div id="joystick">
        <div id="joystickKnob"></div>
      </div>
      <button id="runBtn">RUN</button>
      <button id="actionBtn">E</button>
      <div id="lookPad">화면을 드래그해서 시야 회전</div>
    </div>

    <div id="damageVignette"></div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
