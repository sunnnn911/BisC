<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귀향: 폐교의 불빛</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameShell">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <section id="menu" class="screen active">
      <div class="panel titlePanel">
        <p class="eyebrow">Season 1 Demo</p>
        <h1>귀향: 폐교의 불빛</h1>
        <p class="subtitle">버려진 폐교에서 퓨즈를 찾고, 정전을 해결한 뒤, 나타난 처녀귀신을 봉인하세요.</p>
        <button id="startBtn">게임 시작</button>
        <button id="howBtn" class="ghostButton">조작법</button>
      </div>
    </section>

    <section id="intro" class="screen">
      <div class="panel storyPanel">
        <p id="introText"></p>
        <button id="skipIntroBtn" class="ghostButton">스킵</button>
      </div>
    </section>

    <section id="how" class="screen">
      <div class="panel storyPanel">
        <h2>조작법</h2>
        <p>이동: W A S D 또는 방향키</p>
        <p>상호작용: E</p>
        <p>목표는 왼쪽 위에 표시됩니다.</p>
        <p>처녀귀신이 등장한 뒤 잡히면 게임 오버입니다.</p>
        <button id="backBtn" class="ghostButton">돌아가기</button>
      </div>
    </section>

    <section id="ending" class="screen">
      <div class="panel storyPanel">
        <h2 id="endingTitle">Season 1 Demo Clear</h2>
        <p id="endingText"></p>
        <button id="restartBtn">다시 시작</button>
      </div>
    </section>

    <div id="hud" class="hidden">
      <div id="objectiveBox">
        <div class="label">현재 목표</div>
        <div id="objectiveText">□ 폐교 안으로 들어가기</div>
      </div>
      <div id="inventoryBox">
        <span id="fuseCounter">퓨즈 0/5</span>
        <span id="talismanCounter">부적 0/5</span>
      </div>
      <div id="hintBox">E: 조사 / 상호작용</div>
    </div>

    <div id="message" class="hidden"></div>
    <div id="redFlash"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
